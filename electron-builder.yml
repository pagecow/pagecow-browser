appId: com.pagecow.browser
productName: PageCow
afterPack: scripts/after-pack.cjs
directories:
  output: release
  buildResources: build
files:
  - dist/**
  - electron/**
  - blocked.json
  - package.json
extraResources:
  - from: build/icon.png
    to: icon.png
mac:
  category: public.app-category.productivity
  target:
    - dmg
win:
  target:
    - nsis
linux:
  category: Network
  icon: build/icon.png
  executableName: pagecow-browser
  desktop:
    entry:
      StartupWMClass: pagecow-browser
  target:
    - AppImage
    - deb
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

appId: com.pagecow.browser
productName: PageCow
afterPack: scripts/after-pack.cjs
directories:
  output: release
  buildResources: build
files:
  - dist/**
  - electron/**
  - blocked.json
  - package.json
  - build/icon.png
extraResources:
  - from: build/icon.png
    to: icon.png
mac:
  category: public.app-category.productivity
  target:
    - dmg
win:
  target:
    - nsis
linux:
  category: Network
  icon: build/icons
  executableName: pagecow-browser
  # Register as a web browser so the OS lets the user pick PageCow as the
  # default handler for http/https links. Exec defaults to "%U" which forwards
  # the clicked URL as a CLI argument; the main process parses it from argv.
  mimeTypes:
    - x-scheme-handler/http
    - x-scheme-handler/https
  desktop:
    entry:
      StartupWMClass: pagecow-browser
      Categories: Network;WebBrowser;
  target:
    - AppImage
    - deb
deb:
  afterInstall: scripts/linux/debian-postinst.sh
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
